version: 2
project_name: krci

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    main: ./cmd/krci
    binary: krci
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser

archives:
  - id: default
    format_overrides:
      - goos: windows
        formats: [ "zip" ]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: gpg
    artifacts: checksum
    output: true
    args:
      - "--batch"
      - "-u"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

sboms:
  - artifacts: archive
  - id: source
    artifacts: source

source:
  enabled: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Others
      order: 999

brews:
  - name: krci
    repository:
      owner: KubeRocketCI
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/KubeRocketCI/cli"
    description: "KubeRocketCI CLI - Command-line interface for the KubeRocketCI platform"
    license: "Apache-2.0"
    test: |
      system "#{bin}/krci", "version"
      system "#{bin}/krci", "--help"
    install: |
      bin.install "krci"

release:
  github:
    owner: KubeRocketCI
    name: cli
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## KubeRocketCI CLI {{.Tag}} Release

    Welcome to this new release of KubeRocketCI CLI!
  footer: |
    ## Installation

    ### Homebrew (macOS)
    ```bash
    brew tap KubeRocketCI/homebrew-tap
    brew install krci
    ```

    ### Direct Download
    Download the appropriate binary for your platform from the assets below.

  name_template: "{{.ProjectName}} {{.Version}}"
